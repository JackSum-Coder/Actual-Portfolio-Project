<style>
    
    
@import url('https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double:wght@100..900&display=swap');

body {
    background-image: url("assets/computer.png");  
    background-size: cover; 
    background-position: center center; 
    background-repeat: no-repeat; 
    min-height: 100vh; 
    width: 100%;
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    display: block;
}


.heading {
    margin: 0;
    margin-bottom: 0;
    padding: 0;
}
.header-buttons-container {
    margin: 0;
    padding: 0;
    padding-bottom: 20px;
    
}
.contact {
    font-family: "Bitcount Grid Double", sans-serif;
    font-size: 25px;
    font-weight: 400;
    color: #ffffff;
    margin: 60px auto 0;
    max-width: 600px;
    line-height: 1.4;
    text-align: center;
}
.computerPage {
  left: 28%; top: 40%; width: 40%; height: 30%; rotate: 0deg;
}
.hotspot {
  position: absolute;
    cursor: pointer;
    border: 2px solid transparent;
    border-radius: 8px;
    transition: all 0.2s;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
}
.hotspot:hover {
    border-color: #5b8d3c82;
    background: rgba(115, 156, 97, 0.386);
    box-shadow: 0 0 25px rgba(109, 255, 80, 0.5);
    scale: 1.05;
    transition: all 0.6s;
}
.hotspot .label {
    background: rgba(0,0,0,0.8);
    color: #fff;
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 1.1rem;
    line-height: 1.2;
  }
